openapi: 3.1.0
info:
  title: Splunk Enterprise REST API
  description: >-
    The Splunk Enterprise REST API provides programmatic access to Splunk
    Enterprise functionality including search, indexing, data inputs, and
    system management. All requests are made over HTTPS to the splunkd
    management port (default 8089). Authentication is required via Splunk
    authentication tokens or HTTP Basic authentication with a valid Splunk
    username and password. Responses are available in JSON and XML formats.
  version: 9.4.0
  contact:
    name: Splunk Inc.
    url: https://www.splunk.com
    email: devinfo@splunk.com
  license:
    name: Splunk Terms of Service
    url: https://www.splunk.com/en_us/legal/splunk-general-terms.html
  x-apisguru-categories:
    - analytics
    - monitoring
    - security
  x-logo:
    url: https://www.splunk.com/content/dam/splunk2/images/icons/favicons/favicon.ico
externalDocs:
  description: Splunk Enterprise REST API Reference
  url: https://docs.splunk.com/Documentation/Splunk/latest/RESTREF/RESTprolog
servers:
  - url: https://{host}:{port}
    description: Splunk Enterprise management endpoint
    variables:
      host:
        default: localhost
        description: Hostname or IP address of the Splunk Enterprise instance
      port:
        default: "8089"
        description: splunkd management port
security:
  - BearerAuth: []
  - BasicAuth: []
tags:
  - name: Search
    description: >-
      Endpoints for creating, managing, and retrieving search jobs and
      their results. Splunk search processing language (SPL) queries are
      submitted as search jobs that run asynchronously.
    externalDocs:
      url: https://docs.splunk.com/Documentation/Splunk/latest/RESTREF/RESTsearch
  - name: Index
    description: >-
      Endpoints for managing Splunk indexes, which store and organize
      ingested data. Indexes can be created, modified, listed, and
      configured for retention and storage policies.
    externalDocs:
      url: https://docs.splunk.com/Documentation/Splunk/latest/RESTREF/RESTindex
  - name: Data Inputs
    description: >-
      Endpoints for configuring and managing data inputs including
      monitors, TCP/UDP inputs, scripted inputs, and HTTP Event
      Collector (HEC) tokens. Data inputs define how Splunk ingests data.
    externalDocs:
      url: https://docs.splunk.com/Documentation/Splunk/latest/RESTREF/RESTinput
paths:
  /services/search/jobs:
    get:
      operationId: listSearchJobs
      summary: List search jobs
      description: >-
        Returns a list of current search jobs for the authenticated user.
        Includes job status, progress, and metadata for each job.
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
        - name: search
          in: query
          description: Filter search jobs by search string
          schema:
            type: string
        - name: sort_key
          in: query
          description: Field to sort by
          schema:
            type: string
            default: dispatch_time
        - name: sort_dir
          in: query
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: List of search jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchJobList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createSearchJob
      summary: Create a search job
      description: >-
        Creates a new search job. The search job runs asynchronously. Use
        the returned search ID (sid) to check job status and retrieve
        results. Searches use the Splunk Search Processing Language (SPL).
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/SearchJobCreateRequest"
      responses:
        "201":
          description: Search job created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sid:
                    type: string
                    description: The search ID assigned to the new search job
                    examples:
                      - "1234567890.12345"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /services/search/jobs/{search_id}:
    get:
      operationId: getSearchJob
      summary: Get search job details
      description: >-
        Returns detailed information about a specific search job including
        its status, progress, performance metrics, and configuration.
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/SearchId"
        - $ref: "#/components/parameters/OutputMode"
      responses:
        "200":
          description: Search job details returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchJob"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteSearchJob
      summary: Delete a search job
      description: >-
        Cancels and deletes the specified search job and its results.
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/SearchId"
      responses:
        "200":
          description: Search job deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/search/jobs/{search_id}/control:
    post:
      operationId: controlSearchJob
      summary: Control a search job
      description: >-
        Execute a control action on a search job such as pause, unpause,
        finalize, cancel, or touch (extend the job lifetime).
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/SearchId"
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  description: The control action to execute
                  enum:
                    - pause
                    - unpause
                    - finalize
                    - cancel
                    - touch
                    - setttl
                    - setpriority
                    - enablepreview
                    - disablepreview
                ttl:
                  type: integer
                  description: Time to live in seconds (used with setttl action)
                priority:
                  type: integer
                  description: Priority value 0-10 (used with setpriority action)
                  minimum: 0
                  maximum: 10
      responses:
        "200":
          description: Control action executed successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/search/jobs/{search_id}/results:
    get:
      operationId: getSearchResults
      summary: Get search results
      description: >-
        Returns the results of a completed search job. Results are
        available only after the search job has finished. Use the
        count and offset parameters for pagination.
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/SearchId"
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
        - name: search
          in: query
          description: Post-processing search string to filter results
          schema:
            type: string
        - name: field_list
          in: query
          description: Comma-separated list of fields to return
          schema:
            type: string
      responses:
        "200":
          description: Search results returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "204":
          description: Search job has not yet finished; no results available
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/search/jobs/{search_id}/events:
    get:
      operationId: getSearchEvents
      summary: Get search events
      description: >-
        Returns the untransformed events of a search job. Unlike results,
        events return the raw data before any transforming commands are
        applied. Available for searches that include non-transforming
        commands.
      tags:
        - Search
      parameters:
        - $ref: "#/components/parameters/SearchId"
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
        - name: earliest_time
          in: query
          description: Earliest time boundary for events
          schema:
            type: string
        - name: latest_time
          in: query
          description: Latest time boundary for events
          schema:
            type: string
        - name: search
          in: query
          description: Post-processing search to filter events
          schema:
            type: string
        - name: field_list
          in: query
          description: Comma-separated list of fields to return
          schema:
            type: string
        - name: truncation_mode
          in: query
          description: How to truncate long lines
          schema:
            type: string
            enum:
              - abstract
              - truncate
        - name: max_lines
          in: query
          description: Maximum number of lines per event
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Search events returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "204":
          description: No events available yet
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/search/jobs/export:
    get:
      operationId: exportSearchResults
      summary: Export search results
      description: >-
        Runs a search and streams results back as they become available,
        rather than waiting for the search to complete. This is a
        streaming endpoint suitable for long-running searches or real-time
        searches. The search runs synchronously and results stream back
        in the response.
      tags:
        - Search
      parameters:
        - name: search
          in: query
          required: true
          description: The SPL search query to execute
          schema:
            type: string
        - $ref: "#/components/parameters/OutputMode"
        - name: earliest_time
          in: query
          description: Earliest time for the search
          schema:
            type: string
        - name: latest_time
          in: query
          description: Latest time for the search
          schema:
            type: string
        - name: auto_cancel
          in: query
          description: Seconds of inactivity after which the search is cancelled
          schema:
            type: integer
        - name: enable_lookups
          in: query
          description: Whether to enable lookups during the search
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Search results streaming successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/data/indexes:
    get:
      operationId: listIndexes
      summary: List indexes
      description: >-
        Returns a list of all indexes accessible to the authenticated
        user. Includes index configuration, storage paths, and
        data retention settings.
      tags:
        - Index
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
        - name: search
          in: query
          description: Filter indexes by name or properties
          schema:
            type: string
        - name: sort_key
          in: query
          description: Field to sort by
          schema:
            type: string
        - name: sort_dir
          in: query
          description: Sort direction
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: datatype
          in: query
          description: Filter by data type
          schema:
            type: string
            enum:
              - all
              - event
              - metric
      responses:
        "200":
          description: Index list returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createIndex
      summary: Create a new index
      description: >-
        Creates a new index with the specified configuration. The index
        name must be unique and conform to Splunk naming conventions.
      tags:
        - Index
      parameters:
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IndexCreateRequest"
      responses:
        "201":
          description: Index created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Index"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: An index with the specified name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/data/indexes/{name}:
    get:
      operationId: getIndex
      summary: Get index details
      description: >-
        Returns detailed configuration and status information for a
        specific index including storage paths, retention settings,
        and current size.
      tags:
        - Index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/OutputMode"
      responses:
        "200":
          description: Index details returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Index"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: updateIndex
      summary: Update index configuration
      description: >-
        Updates the configuration of an existing index. Not all index
        properties can be modified after creation.
      tags:
        - Index
      parameters:
        - $ref: "#/components/parameters/IndexName"
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IndexUpdateRequest"
      responses:
        "200":
          description: Index updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Index"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteIndex
      summary: Delete an index
      description: >-
        Marks an index for deletion. The index data is removed according
        to the configured retention policy. Requires the admin role.
      tags:
        - Index
      parameters:
        - $ref: "#/components/parameters/IndexName"
      responses:
        "200":
          description: Index marked for deletion
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /services/data/inputs/monitor:
    get:
      operationId: listMonitorInputs
      summary: List file and directory monitor inputs
      description: >-
        Returns a list of file and directory monitoring inputs. Monitor
        inputs continuously watch files and directories for new data.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
        - name: search
          in: query
          description: Filter inputs by search string
          schema:
            type: string
      responses:
        "200":
          description: Monitor inputs listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorInputList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMonitorInput
      summary: Create a file or directory monitor input
      description: >-
        Creates a new file or directory monitoring input. The specified
        path will be monitored for new data and ingested into the
        specified index.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MonitorInputCreateRequest"
      responses:
        "201":
          description: Monitor input created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorInput"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: A monitor input for this path already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/data/inputs/monitor/{name}:
    get:
      operationId: getMonitorInput
      summary: Get monitor input details
      description: >-
        Returns configuration details for a specific file or directory
        monitoring input.
      tags:
        - Data Inputs
      parameters:
        - name: name
          in: path
          required: true
          description: The name (path) of the monitor input
          schema:
            type: string
        - $ref: "#/components/parameters/OutputMode"
      responses:
        "200":
          description: Monitor input details returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorInput"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: updateMonitorInput
      summary: Update a monitor input
      description: Updates the configuration of an existing monitor input.
      tags:
        - Data Inputs
      parameters:
        - name: name
          in: path
          required: true
          description: The name (path) of the monitor input
          schema:
            type: string
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/MonitorInputUpdateRequest"
      responses:
        "200":
          description: Monitor input updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorInput"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteMonitorInput
      summary: Delete a monitor input
      description: >-
        Deletes the specified monitor input. Splunk stops monitoring the
        associated file or directory.
      tags:
        - Data Inputs
      parameters:
        - name: name
          in: path
          required: true
          description: The name (path) of the monitor input
          schema:
            type: string
      responses:
        "200":
          description: Monitor input deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/data/inputs/tcp/cooked:
    get:
      operationId: listTcpCookedInputs
      summary: List cooked TCP inputs
      description: >-
        Returns a list of TCP cooked data inputs. Cooked TCP inputs
        receive data from Splunk forwarders.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: TCP cooked inputs listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TcpInputList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/data/inputs/tcp/raw:
    get:
      operationId: listTcpRawInputs
      summary: List raw TCP inputs
      description: >-
        Returns a list of raw TCP data inputs. Raw TCP inputs receive
        data directly over a TCP port without Splunk protocol framing.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: TCP raw inputs listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TcpInputList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/data/inputs/udp:
    get:
      operationId: listUdpInputs
      summary: List UDP inputs
      description: >-
        Returns a list of UDP data inputs. UDP inputs receive data
        over a UDP port.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: UDP inputs listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdpInputList"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /services/data/inputs/http:
    get:
      operationId: listHttpInputTokens
      summary: List HTTP Event Collector tokens
      description: >-
        Returns a list of HTTP Event Collector (HEC) tokens configured
        on the Splunk instance. Each token defines an input channel
        for receiving data over HTTP/HTTPS.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
        - $ref: "#/components/parameters/Count"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: HEC tokens listed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecTokenList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createHttpInputToken
      summary: Create an HTTP Event Collector token
      description: >-
        Creates a new HTTP Event Collector (HEC) token for data
        ingestion over HTTP/HTTPS.
      tags:
        - Data Inputs
      parameters:
        - $ref: "#/components/parameters/OutputMode"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/HecTokenCreateRequest"
      responses:
        "201":
          description: HEC token created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: A token with that name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /services/collector/event:
    post:
      operationId: sendEvent
      summary: Send events via HTTP Event Collector
      description: >-
        Sends one or more events to Splunk via HTTP Event Collector.
        Events are submitted as JSON objects. Multiple events can be
        sent in a single request by concatenating JSON objects.
      tags:
        - Data Inputs
      security:
        - HecToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HecEvent"
      responses:
        "200":
          description: Events received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
        "400":
          description: Invalid data format or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
        "401":
          description: Token is disabled or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
        "403":
          description: Insufficient permissions for the token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
  /services/collector/raw:
    post:
      operationId: sendRawEvent
      summary: Send raw data via HTTP Event Collector
      description: >-
        Sends raw event data to Splunk via HTTP Event Collector. The
        raw data is ingested as-is without requiring JSON formatting.
        Useful for log file data and other unstructured text.
      tags:
        - Data Inputs
      security:
        - HecToken: []
      parameters:
        - name: channel
          in: query
          description: >-
            Channel identifier (GUID) for event ordering. Required if
            indexer acknowledgment is enabled.
          schema:
            type: string
            format: uuid
        - name: sourcetype
          in: query
          description: Override the sourcetype for the event data
          schema:
            type: string
        - name: source
          in: query
          description: Override the source for the event data
          schema:
            type: string
        - name: host
          in: query
          description: Override the host for the event data
          schema:
            type: string
        - name: index
          in: query
          description: Override the destination index for the event data
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Raw event data
      responses:
        "200":
          description: Raw data received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
        "401":
          description: Token is disabled or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
  /services/collector/ack:
    post:
      operationId: checkAckStatus
      summary: Check indexer acknowledgment status
      description: >-
        Queries the indexer acknowledgment status for events sent via
        HTTP Event Collector. Returns whether events with specified
        ack IDs have been indexed.
      tags:
        - Data Inputs
      security:
        - HecToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - acks
              properties:
                acks:
                  type: array
                  description: List of ack IDs to check
                  items:
                    type: integer
                  examples:
                    - [1, 2, 3]
      responses:
        "200":
          description: Acknowledgment status returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  acks:
                    type: object
                    description: Map of ack ID to boolean indexed status
                    additionalProperties:
                      type: boolean
        "400":
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HecResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Splunk authentication token. Obtain a session key by
        authenticating to /services/auth/login or use a pre-configured
        bearer token from Settings > Tokens in Splunk Web.
    BasicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication with a valid Splunk username and
        password. The credentials are sent as a Base64-encoded string
        in the Authorization header.
    HecToken:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        HTTP Event Collector token. Send as "Splunk <token>" in the
        Authorization header. Tokens are configured in Splunk Web
        under Settings > Data Inputs > HTTP Event Collector.
  parameters:
    OutputMode:
      name: output_mode
      in: query
      description: Response format
      schema:
        type: string
        enum:
          - json
          - xml
          - csv
        default: xml
    Count:
      name: count
      in: query
      description: Maximum number of items to return. A value of 0 returns all items.
      schema:
        type: integer
        default: 30
        minimum: 0
    Offset:
      name: offset
      in: query
      description: >-
        Index of the first item to return. Used with count for pagination.
      schema:
        type: integer
        default: 0
        minimum: 0
    SearchId:
      name: search_id
      in: path
      required: true
      description: The search ID (sid) of the search job
      schema:
        type: string
    IndexName:
      name: name
      in: path
      required: true
      description: The name of the index
      schema:
        type: string
  schemas:
    SearchJobCreateRequest:
      type: object
      required:
        - search
      properties:
        search:
          type: string
          description: The SPL search query to execute
          examples:
            - "search index=main sourcetype=syslog | head 100"
        earliest_time:
          type: string
          description: >-
            Earliest time for the search using relative or absolute
            time format
          examples:
            - "-24h@h"
            - "2024-01-01T00:00:00.000Z"
        latest_time:
          type: string
          description: Latest time for the search
          examples:
            - "now"
        search_mode:
          type: string
          description: The search mode
          enum:
            - normal
            - realtime
          default: normal
        exec_mode:
          type: string
          description: >-
            Execution mode. Normal runs asynchronously, oneshot runs
            synchronously, blocking waits for completion.
          enum:
            - normal
            - blocking
            - oneshot
          default: normal
        max_count:
          type: integer
          description: Maximum number of results to return
          default: 10000
        max_time:
          type: integer
          description: Maximum time in seconds before the search is finalized
          default: 0
        timeout:
          type: integer
          description: >-
            Number of seconds to keep the search after processing has
            stopped
          default: 86400
        rf:
          type: string
          description: >-
            Comma-separated list of required fields to include in results
        namespace:
          type: string
          description: Application namespace for the search
        id:
          type: string
          description: >-
            Optional custom search ID. If not specified, Splunk generates
            one automatically.
        status_buckets:
          type: integer
          description: >-
            Number of status buckets to generate for the search timeline.
            Set to a value greater than 0 to enable timeline.
          default: 0
        auto_cancel:
          type: integer
          description: >-
            Seconds of inactivity after which the search is automatically
            cancelled. 0 means never auto-cancel.
          default: 0
        auto_finalize_ec:
          type: integer
          description: >-
            Auto-finalize the search after this number of events have
            been processed. 0 disables auto-finalize.
          default: 0
        auto_pause:
          type: integer
          description: >-
            Seconds of inactivity after which the search is automatically
            paused. 0 means never auto-pause.
          default: 0
        enable_lookups:
          type: boolean
          description: Whether to enable lookups during the search
          default: true
        reload_macros:
          type: boolean
          description: Whether to reload macro definitions before the search
          default: true
        reduce_freq:
          type: integer
          description: >-
            How frequently to invoke the reduce phase (seconds)
          default: 0
        spawn_process:
          type: boolean
          description: Whether to run the search in a separate process
          default: true
    SearchJob:
      type: object
      properties:
        sid:
          type: string
          description: The unique search ID
        content:
          type: object
          properties:
            sid:
              type: string
            dispatchState:
              type: string
              description: Current state of the search job
              enum:
                - QUEUED
                - PARSING
                - RUNNING
                - PAUSED
                - FINALIZING
                - DONE
                - FAILED
            doneProgress:
              type: number
              description: Progress percentage (0.0 to 1.0)
              minimum: 0
              maximum: 1
            scanCount:
              type: integer
              description: Number of events scanned so far
            eventCount:
              type: integer
              description: Number of events returned
            resultCount:
              type: integer
              description: Number of results produced
            runDuration:
              type: number
              description: Time elapsed in seconds
            earliestTime:
              type: string
              format: date-time
              description: Earliest time boundary of the search
            latestTime:
              type: string
              format: date-time
              description: Latest time boundary of the search
            cursorTime:
              type: string
              format: date-time
              description: Current time position of the search cursor
            eventSearch:
              type: string
              description: The search string applied to events
            reportSearch:
              type: string
              description: The reporting search string
            isSaved:
              type: boolean
            isFinalized:
              type: boolean
            isPaused:
              type: boolean
            isZombie:
              type: boolean
            isDone:
              type: boolean
            isFailed:
              type: boolean
            isPreviewEnabled:
              type: boolean
            isRealTimeSearch:
              type: boolean
            isSavedSearch:
              type: boolean
            isRemoteTimeline:
              type: boolean
            priority:
              type: integer
              description: Job priority (0-10)
            ttl:
              type: integer
              description: Time to live in seconds
            request:
              type: object
              description: Original request parameters
            performance:
              type: object
              description: Performance metrics for the search
            messages:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - DEBUG
                      - INFO
                      - WARN
                      - ERROR
                      - FATAL
                  text:
                    type: string
    SearchJobList:
      type: object
      properties:
        origin:
          type: string
          description: URI of the request
        updated:
          type: string
          format: date-time
        generator:
          type: object
          properties:
            build:
              type: string
            version:
              type: string
        entry:
          type: array
          items:
            $ref: "#/components/schemas/SearchJob"
        paging:
          $ref: "#/components/schemas/Paging"
    SearchResults:
      type: object
      properties:
        init_offset:
          type: integer
          description: Starting offset of results
        results:
          type: array
          description: Array of result rows
          items:
            type: object
            additionalProperties: true
            description: >-
              Each result is a key-value object where keys are field
              names and values are field values
        fields:
          type: array
          description: Metadata about the fields in the results
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              text:
                type: string
        preview:
          type: boolean
          description: Whether results are preview (partial) results
        highlighted:
          type: object
          description: Highlighted terms in results
    Index:
      type: object
      properties:
        name:
          type: string
          description: The index name
        content:
          type: object
          properties:
            datatype:
              type: string
              description: The type of data stored in the index
              enum:
                - event
                - metric
            totalEventCount:
              type: integer
              description: Total number of events in the index
            currentDBSizeMB:
              type: integer
              description: Current database size in megabytes
            maxDataSize:
              type: string
              description: Maximum size of a hot bucket
              enum:
                - auto
                - auto_high_volume
              default: auto
            maxTotalDataSizeMB:
              type: integer
              description: Maximum total size of the index in MB
              default: 500000
            maxHotBuckets:
              type: integer
              description: Maximum number of hot buckets for the index
              default: 3
            maxWarmDBCount:
              type: integer
              description: Maximum number of warm buckets
              default: 300
            frozenTimePeriodInSecs:
              type: integer
              description: >-
                Number of seconds after which data is frozen (archived
                or deleted). Default is 188697600 (6 years).
              default: 188697600
            homePath:
              type: string
              description: Path for hot and warm buckets
            coldPath:
              type: string
              description: Path for cold buckets
            thawedPath:
              type: string
              description: Path for thawed (restored) buckets
            disabled:
              type: boolean
              description: Whether the index is disabled
            isInternal:
              type: boolean
              description: Whether this is an internal Splunk index
            minTime:
              type: string
              description: Earliest time of data in the index
            maxTime:
              type: string
              description: Latest time of data in the index
            repFactor:
              type: string
              description: Replication factor for clustered environments
            enableOnlineBucketRepair:
              type: boolean
            quarantinePastSecs:
              type: integer
              description: >-
                Events with timestamps this many seconds in the past
                are quarantined
            quarantineFutureSecs:
              type: integer
              description: >-
                Events with timestamps this many seconds in the future
                are quarantined
    IndexList:
      type: object
      properties:
        origin:
          type: string
        updated:
          type: string
          format: date-time
        entry:
          type: array
          items:
            $ref: "#/components/schemas/Index"
        paging:
          $ref: "#/components/schemas/Paging"
    IndexCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name for the new index
          examples:
            - my_new_index
        datatype:
          type: string
          description: Type of data the index will hold
          enum:
            - event
            - metric
          default: event
        homePath:
          type: string
          description: Absolute path for hot and warm bucket storage
        coldPath:
          type: string
          description: Absolute path for cold bucket storage
        thawedPath:
          type: string
          description: Absolute path for thawed bucket storage
        maxTotalDataSizeMB:
          type: integer
          description: Maximum total size of the index in MB
          default: 500000
        maxDataSize:
          type: string
          description: Maximum size of a hot bucket
          default: auto
        frozenTimePeriodInSecs:
          type: integer
          description: Seconds until data is frozen
          default: 188697600
        maxHotBuckets:
          type: integer
          description: Maximum number of hot buckets
          default: 3
        maxWarmDBCount:
          type: integer
          description: Maximum number of warm buckets
          default: 300
    IndexUpdateRequest:
      type: object
      properties:
        maxTotalDataSizeMB:
          type: integer
          description: Maximum total size of the index in MB
        frozenTimePeriodInSecs:
          type: integer
          description: Seconds until data is frozen
        maxHotBuckets:
          type: integer
          description: Maximum number of hot buckets
        maxWarmDBCount:
          type: integer
          description: Maximum number of warm buckets
        disabled:
          type: boolean
          description: Whether to disable the index
        coldToFrozenDir:
          type: string
          description: >-
            Path to archive frozen buckets to. If not set, frozen data
            is deleted.
        coldToFrozenScript:
          type: string
          description: Script to run when freezing buckets
    MonitorInput:
      type: object
      properties:
        name:
          type: string
          description: The monitored file or directory path
        content:
          type: object
          properties:
            index:
              type: string
              description: Destination index for the monitored data
              default: default
            sourcetype:
              type: string
              description: Source type assigned to the monitored data
            source:
              type: string
              description: Source value assigned to the monitored data
            host:
              type: string
              description: Host value assigned to the monitored data
            disabled:
              type: boolean
              description: Whether the monitor input is disabled
            followTail:
              type: boolean
              description: >-
                If true, monitoring starts at the end of file. If false,
                monitoring starts from the beginning.
            recursive:
              type: boolean
              description: Whether to recursively monitor subdirectories
            whitelist:
              type: string
              description: Regex pattern for files to include
            blacklist:
              type: string
              description: Regex pattern for files to exclude
            crcSalt:
              type: string
              description: String to add to the CRC calculation
            ignoreOlderThan:
              type: string
              description: >-
                Time modifier to skip files that have not been modified
                within the specified time
    MonitorInputList:
      type: object
      properties:
        origin:
          type: string
        updated:
          type: string
          format: date-time
        entry:
          type: array
          items:
            $ref: "#/components/schemas/MonitorInput"
        paging:
          $ref: "#/components/schemas/Paging"
    MonitorInputCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The file or directory path to monitor
          examples:
            - /var/log/syslog
        index:
          type: string
          description: Destination index
          default: default
        sourcetype:
          type: string
          description: Source type to assign
        source:
          type: string
          description: Source value to assign
        host:
          type: string
          description: Host value to assign
        disabled:
          type: boolean
          description: Whether to create the input in disabled state
          default: false
        followTail:
          type: boolean
          description: Start monitoring from end of file
          default: false
        recursive:
          type: boolean
          description: Recursively monitor subdirectories
          default: true
        whitelist:
          type: string
          description: Regex pattern for files to include
        blacklist:
          type: string
          description: Regex pattern for files to exclude
    MonitorInputUpdateRequest:
      type: object
      properties:
        index:
          type: string
          description: Destination index
        sourcetype:
          type: string
          description: Source type to assign
        source:
          type: string
          description: Source value to assign
        host:
          type: string
          description: Host value to assign
        disabled:
          type: boolean
          description: Whether to disable the input
    TcpInput:
      type: object
      properties:
        name:
          type: string
          description: The TCP port number
        content:
          type: object
          properties:
            index:
              type: string
              description: Destination index
            sourcetype:
              type: string
              description: Source type for incoming data
            source:
              type: string
              description: Source value for incoming data
            host:
              type: string
              description: Host value for incoming data
            disabled:
              type: boolean
            restrictToHost:
              type: string
              description: Accept connections only from this host
            connection_host:
              type: string
              description: How to determine the host value
              enum:
                - ip
                - dns
                - none
            ssl:
              type: boolean
              description: Whether SSL is enabled for this input
    TcpInputList:
      type: object
      properties:
        origin:
          type: string
        updated:
          type: string
          format: date-time
        entry:
          type: array
          items:
            $ref: "#/components/schemas/TcpInput"
        paging:
          $ref: "#/components/schemas/Paging"
    UdpInput:
      type: object
      properties:
        name:
          type: string
          description: The UDP port number
        content:
          type: object
          properties:
            index:
              type: string
              description: Destination index
            sourcetype:
              type: string
              description: Source type for incoming data
            source:
              type: string
              description: Source value for incoming data
            host:
              type: string
              description: Host value for incoming data
            disabled:
              type: boolean
            connection_host:
              type: string
              description: How to determine the host value
              enum:
                - ip
                - dns
                - none
            no_appending_timestamp:
              type: boolean
              description: Whether to prevent Splunk from appending a timestamp
            no_priority_stripping:
              type: boolean
              description: Whether to prevent Splunk from stripping priority
    UdpInputList:
      type: object
      properties:
        origin:
          type: string
        updated:
          type: string
          format: date-time
        entry:
          type: array
          items:
            $ref: "#/components/schemas/UdpInput"
        paging:
          $ref: "#/components/schemas/Paging"
    HecToken:
      type: object
      properties:
        name:
          type: string
          description: The token name
        content:
          type: object
          properties:
            token:
              type: string
              description: The token value (GUID)
            index:
              type: string
              description: Default destination index
            indexes:
              type: array
              description: List of allowed indexes
              items:
                type: string
            sourcetype:
              type: string
              description: Default sourcetype
            source:
              type: string
              description: Default source value
            host:
              type: string
              description: Default host value
            disabled:
              type: boolean
              description: Whether the token is disabled
            useACK:
              type: boolean
              description: Whether indexer acknowledgment is enabled
    HecTokenList:
      type: object
      properties:
        origin:
          type: string
        updated:
          type: string
          format: date-time
        entry:
          type: array
          items:
            $ref: "#/components/schemas/HecToken"
        paging:
          $ref: "#/components/schemas/Paging"
    HecTokenCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name for the new HEC token
        index:
          type: string
          description: Default destination index
          default: main
        indexes:
          type: string
          description: Comma-separated list of allowed indexes
        sourcetype:
          type: string
          description: Default sourcetype
        source:
          type: string
          description: Default source value
        host:
          type: string
          description: Default host value
        disabled:
          type: boolean
          description: Whether to create the token in disabled state
          default: false
        useACK:
          type: boolean
          description: Whether to enable indexer acknowledgment
          default: false
    HecEvent:
      type: object
      required:
        - event
      properties:
        time:
          oneOf:
            - type: number
            - type: string
          description: >-
            Event timestamp in epoch time (seconds since 1970-01-01).
            If omitted, Splunk uses the current time.
          examples:
            - 1704067200.000
        host:
          type: string
          description: Hostname or IP address of the event source
          examples:
            - webserver01
        source:
          type: string
          description: Source of the event
          examples:
            - /var/log/application.log
        sourcetype:
          type: string
          description: Source type for the event
          examples:
            - _json
        index:
          type: string
          description: Destination index for the event
          examples:
            - main
        event:
          description: >-
            The event data. Can be a string or a JSON object. This is
            the actual data payload to be indexed.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
          examples:
            - message: "User logged in"
              user: "admin"
              action: "login"
        fields:
          type: object
          description: >-
            Additional metadata fields to associate with the event.
            These fields are indexed as metadata and can be searched.
          additionalProperties:
            type: string
    HecResponse:
      type: object
      properties:
        text:
          type: string
          description: Human-readable status message
          examples:
            - Success
        code:
          type: integer
          description: Numeric status code
          examples:
            - 0
        invalid-event-number:
          type: integer
          description: >-
            For batched events, the index of the first invalid event
        ackId:
          type: integer
          description: >-
            Acknowledgment ID for tracking indexing status (when
            indexer acknowledgment is enabled)
    Paging:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items available
        perPage:
          type: integer
          description: Number of items per page
        offset:
          type: integer
          description: Current offset
    ErrorResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - ERROR
                  - WARN
                  - INFO
              text:
                type: string
                description: Error message text
  responses:
    BadRequest:
      description: >-
        The request is malformed or contains invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: >-
        Authentication credentials are missing, invalid, or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >-
        The authenticated user does not have permission to perform this
        operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
