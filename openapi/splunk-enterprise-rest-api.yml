          properties:
            token:
              type: string
              description: The token value (GUID)
            index:
              type: string
              description: Default destination index
            indexes:
              type: array
              description: List of allowed indexes
              items:
                type: string
            sourcetype:
              type: string
              description: Default sourcetype
            source:
              type: string
              description: Default source value
            host:
              type: string
              description: Default host value
            disabled:
              type: boolean
              description: Whether the token is disabled
            useACK:
              type: boolean
              description: Whether indexer acknowledgment is enabled
          example: example_value
    HecTokenList:
      type: object
      properties:
        origin:
          type: string
          example: example_value
        updated:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        entry:
          type: array
          items:
            $ref: "#/components/schemas/HecToken"
          example: []
        paging:
          $ref: "#/components/schemas/Paging"
    HecTokenCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Name for the new HEC token
          example: Example Title
        index:
          type: string
          description: Default destination index
          default: main
          example: example_value
        indexes:
          type: string
          description: Comma-separated list of allowed indexes
          example: example_value
        sourcetype:
          type: string
          description: Default sourcetype
          example: example_value
        source:
          type: string
          description: Default source value
          example: example_value
        host:
          type: string
          description: Default host value
          example: example_value
        disabled:
          type: boolean
          description: Whether to create the token in disabled state
          default: false
          example: true
        useACK:
          type: boolean
          description: Whether to enable indexer acknowledgment
          default: false
          example: true
    HecEvent:
      type: object
      required:
      - event
      properties:
        time:
          oneOf:
          - type: number
          - type: string
          description: >-
            Event timestamp in epoch time (seconds since 1970-01-01).
            If omitted, Splunk uses the current time.
          examples:
          - 1704067200.000
        host:
          type: string
          description: Hostname or IP address of the event source
          examples:
          - webserver01
        source:
          type: string
          description: Source of the event
          examples:
          - /var/log/application.log
        sourcetype:
          type: string
          description: Source type for the event
          examples:
          - _json
        index:
          type: string
          description: Destination index for the event
          examples:
          - main
        event:
          description: >-
            The event data. Can be a string or a JSON object. This is
            the actual data payload to be indexed.
          oneOf:
          - type: string
          - type: object
            additionalProperties: true
          examples:
          - message: "User logged in"
            user: "admin"
            action: "login"
        fields:
          type: object
          description: >-
            Additional metadata fields to associate with the event.
            These fields are indexed as metadata and can be searched.
          additionalProperties:
            type: string
          example: example_value
    HecResponse:
      type: object
      properties:
        text:
          type: string
          description: Human-readable status message
          examples:
          - Success
        code:
          type: integer
          description: Numeric status code
          examples:
          - 0
        invalid-event-number:
          type: integer
          description: >-
            For batched events, the index of the first invalid event
          example: 10
        ackId:
          type: integer
          description: >-
            Acknowledgment ID for tracking indexing status (when
            indexer acknowledgment is enabled)
          example: '500123'
    Paging:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items available
          example: 10
        perPage:
          type: integer
          description: Number of items per page
          example: 10
        offset:
          type: integer
          description: Current offset
          example: 10
    ErrorResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - ERROR
                - WARN
                - INFO
              text:
                type: string
                description: Error message text
          example: []
  responses:
    BadRequest:
      description: >-
        The request is malformed or contains invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: >-
        Authentication credentials are missing, invalid, or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: >-
        The authenticated user does not have permission to perform this
        operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
