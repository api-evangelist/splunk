components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >-
        Splunk authentication token. Obtain a session key by
        authenticating to /services/auth/login or use a pre-configured
        bearer token from Settings > Tokens in Splunk Web.
    BasicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication with a valid Splunk username and
        password. The credentials are sent as a Base64-encoded string
        in the Authorization header.
    HecToken:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        HTTP Event Collector token. Send as "Splunk <token>" in the
        Authorization header. Tokens are configured in Splunk Web
        under Settings > Data Inputs > HTTP Event Collector.
  parameters:
    OutputMode:
      name: output_mode
      in: query
      description: Response format
      schema:
        type: string
        enum:
        - json
        - xml
        - csv
        default: xml
    Count:
      name: count
      in: query
      description: Maximum number of items to return. A value of 0 returns all items.
      schema:
        type: integer
        default: 30
        minimum: 0
    Offset:
      name: offset
      in: query
      description: >-
        Index of the first item to return. Used with count for pagination.
      schema:
        type: integer
        default: 0
        minimum: 0
    SearchId:
      name: search_id
      in: path
      required: true
      description: The search ID (sid) of the search job
      schema:
        type: string
    IndexName:
      name: name
      in: path
      required: true
      description: The name of the index
      schema:
        type: string
  schemas:
    SearchJobCreateRequest:
      type: object
      required:
      - search
      properties:
        search:
          type: string
          description: The SPL search query to execute
          examples:
          - "search index=main sourcetype=syslog | head 100"
        earliest_time:
          type: string
          description: >-
            Earliest time for the search using relative or absolute
            time format
          examples:
          - "-24h@h"
          - "2024-01-01T00:00:00.000Z"
        latest_time:
          type: string
          description: Latest time for the search
          examples:
          - "now"
        search_mode:
          type: string
          description: The search mode
          enum:
          - normal
          - realtime
          default: normal
          example: normal
        exec_mode:
          type: string
          description: >-
            Execution mode. Normal runs asynchronously, oneshot runs
            synchronously, blocking waits for completion.
          enum:
          - normal
          - blocking
          - oneshot
          default: normal
          example: normal
        max_count:
          type: integer
          description: Maximum number of results to return
          default: 10000
          example: 10
        max_time:
          type: integer
          description: Maximum time in seconds before the search is finalized
          default: 0
          example: 10
        timeout:
          type: integer
          description: >-
            Number of seconds to keep the search after processing has
            stopped
          default: 86400
          example: 10
        rf:
          type: string
          description: >-
            Comma-separated list of required fields to include in results
          example: example_value
        namespace:
          type: string
          description: Application namespace for the search
          example: example_value
        id:
          type: string
          description: >-
            Optional custom search ID. If not specified, Splunk generates
            one automatically.
          example: abc123
        status_buckets:
          type: integer
          description: >-
            Number of status buckets to generate for the search timeline.
            Set to a value greater than 0 to enable timeline.
          default: 0
          example: 10
        auto_cancel:
          type: integer
          description: >-
            Seconds of inactivity after which the search is automatically
            cancelled. 0 means never auto-cancel.
          default: 0
          example: 10
        auto_finalize_ec:
          type: integer
          description: >-
            Auto-finalize the search after this number of events have
            been processed. 0 disables auto-finalize.
          default: 0
          example: 10
        auto_pause:
          type: integer
          description: >-
            Seconds of inactivity after which the search is automatically
            paused. 0 means never auto-pause.
          default: 0
          example: 10
        enable_lookups:
          type: boolean
          description: Whether to enable lookups during the search
          default: true
          example: true
        reload_macros:
          type: boolean
          description: Whether to reload macro definitions before the search
          default: true
          example: true
        reduce_freq:
          type: integer
          description: >-
            How frequently to invoke the reduce phase (seconds)
          default: 0
          example: 10
        spawn_process:
          type: boolean
          description: Whether to run the search in a separate process
          default: true
          example: true
    SearchJob:
      type: object
      properties:
        sid:
          type: string
          description: The unique search ID
          example: '500123'
        content:
          type: object
          properties:
            sid:
              type: string
            dispatchState:
              type: string
              description: Current state of the search job
              enum:
              - QUEUED
              - PARSING
              - RUNNING
              - PAUSED
              - FINALIZING
              - DONE
              - FAILED
            doneProgress:
              type: number
              description: Progress percentage (0.0 to 1.0)
              minimum: 0
              maximum: 1
            scanCount:
              type: integer
              description: Number of events scanned so far
            eventCount:
              type: integer
              description: Number of events returned
            resultCount:
              type: integer
              description: Number of results produced
            runDuration:
              type: number
              description: Time elapsed in seconds
            earliestTime:
              type: string
              format: date-time
              description: Earliest time boundary of the search
            latestTime:
              type: string
              format: date-time
              description: Latest time boundary of the search
            cursorTime:
              type: string
              format: date-time
              description: Current time position of the search cursor
            eventSearch:
              type: string
              description: The search string applied to events
            reportSearch:
              type: string
              description: The reporting search string
            isSaved:
              type: boolean
            isFinalized:
              type: boolean
            isPaused:
              type: boolean
            isZombie:
              type: boolean
            isDone:
              type: boolean
            isFailed:
              type: boolean
            isPreviewEnabled:
              type: boolean
            isRealTimeSearch:
              type: boolean
            isSavedSearch:
              type: boolean
            isRemoteTimeline:
              type: boolean
            priority:
              type: integer
              description: Job priority (0-10)
            ttl:
              type: integer
              description: Time to live in seconds
            request:
              type: object
              description: Original request parameters
            performance:
              type: object
              description: Performance metrics for the search
            messages:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                    - DEBUG
                    - INFO
                    - WARN
                    - ERROR
                    - FATAL
                  text:
                    type: string
          example: example_value
    SearchJobList:
      type: object
      properties:
        origin:
          type: string
          description: URI of the request
          example: example_value
        updated:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        generator:
          type: object
          properties:
            build:
              type: string
            version:
              type: string
          example: example_value
        entry:
          type: array
          items:
            $ref: "#/components/schemas/SearchJob"
          example: []
        paging:
          $ref: "#/components/schemas/Paging"
    SearchResults:
      type: object
      properties:
