              Each result is a key-value object where keys are field
              names and values are field values
          example: []
        fields:
          type: array
          description: Metadata about the fields in the results
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
          example: []
        messages:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
