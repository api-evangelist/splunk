                type: string
          example: []
        preview:
          type: boolean
          description: Whether results are preview (partial) results
          example: true
        highlighted:
          type: object
          description: Highlighted terms in results
          example: example_value
    Index:
      type: object
      properties:
        name:
          type: string
          description: The index name
          example: Example Title
        content:
          type: object
          properties:
            datatype:
              type: string
              description: The type of data stored in the index
              enum:
              - event
              - metric
            totalEventCount:
              type: integer
              description: Total number of events in the index
            currentDBSizeMB:
              type: integer
              description: Current database size in megabytes
            maxDataSize:
              type: string
              description: Maximum size of a hot bucket
              enum:
              - auto
              - auto_high_volume
              default: auto
            maxTotalDataSizeMB:
              type: integer
              description: Maximum total size of the index in MB
              default: 500000
            maxHotBuckets:
              type: integer
              description: Maximum number of hot buckets for the index
              default: 3
            maxWarmDBCount:
              type: integer
              description: Maximum number of warm buckets
              default: 300
            frozenTimePeriodInSecs:
              type: integer
              description: >-
                Number of seconds after which data is frozen (archived
                or deleted). Default is 188697600 (6 years).
              default: 188697600
            homePath:
              type: string
              description: Path for hot and warm buckets
            coldPath:
              type: string
              description: Path for cold buckets
            thawedPath:
              type: string
              description: Path for thawed (restored) buckets
            disabled:
              type: boolean
              description: Whether the index is disabled
            isInternal:
              type: boolean
              description: Whether this is an internal Splunk index
            minTime:
              type: string
              description: Earliest time of data in the index
            maxTime:
              type: string
              description: Latest time of data in the index
            repFactor:
              type: string
              description: Replication factor for clustered environments
            enableOnlineBucketRepair:
              type: boolean
            quarantinePastSecs:
              type: integer
              description: >-
                Events with timestamps this many seconds in the past
                are quarantined
            quarantineFutureSecs:
              type: integer
              description: >-
                Events with timestamps this many seconds in the future
                are quarantined
          example: example_value
    IndexList:
      type: object
      properties:
        origin:
          type: string
          example: example_value
        updated:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        entry:
          type: array
          items:
            $ref: "#/components/schemas/Index"
          example: []
        paging:
          $ref: "#/components/schemas/Paging"
    IndexCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: The name for the new index
          examples:
          - my_new_index
        datatype:
          type: string
          description: Type of data the index will hold
          enum:
          - event
          - metric
          default: event
          example: event
        homePath:
          type: string
          description: Absolute path for hot and warm bucket storage
          example: example_value
        coldPath:
          type: string
          description: Absolute path for cold bucket storage
          example: example_value
        thawedPath:
          type: string
          description: Absolute path for thawed bucket storage
          example: example_value
        maxTotalDataSizeMB:
          type: integer
          description: Maximum total size of the index in MB
          default: 500000
          example: 10
        maxDataSize:
          type: string
          description: Maximum size of a hot bucket
          default: auto
          example: example_value
        frozenTimePeriodInSecs:
          type: integer
          description: Seconds until data is frozen
          default: 188697600
          example: 10
        maxHotBuckets:
          type: integer
          description: Maximum number of hot buckets
          default: 3
          example: 10
        maxWarmDBCount:
          type: integer
          description: Maximum number of warm buckets
          default: 300
          example: 10
    IndexUpdateRequest:
      type: object
      properties:
        maxTotalDataSizeMB:
          type: integer
          description: Maximum total size of the index in MB
          example: 10
        frozenTimePeriodInSecs:
          type: integer
          description: Seconds until data is frozen
          example: 10
        maxHotBuckets:
          type: integer
          description: Maximum number of hot buckets
          example: 10
        maxWarmDBCount:
          type: integer
          description: Maximum number of warm buckets
          example: 10
        disabled:
          type: boolean
          description: Whether to disable the index
          example: true
        coldToFrozenDir:
          type: string
          description: >-
            Path to archive frozen buckets to. If not set, frozen data
            is deleted.
          example: example_value
        coldToFrozenScript:
          type: string
          description: Script to run when freezing buckets
          example: example_value
    MonitorInput:
      type: object
      properties:
        name:
          type: string
          description: The monitored file or directory path
          example: Example Title
        content:
          type: object
          properties:
            index:
              type: string
              description: Destination index for the monitored data
              default: default
            sourcetype:
              type: string
              description: Source type assigned to the monitored data
            source:
              type: string
              description: Source value assigned to the monitored data
            host:
              type: string
              description: Host value assigned to the monitored data
            disabled:
              type: boolean
              description: Whether the monitor input is disabled
            followTail:
              type: boolean
              description: >-
                If true, monitoring starts at the end of file. If false,
                monitoring starts from the beginning.
            recursive:
              type: boolean
              description: Whether to recursively monitor subdirectories
            whitelist:
              type: string
              description: Regex pattern for files to include
            blacklist:
              type: string
              description: Regex pattern for files to exclude
            crcSalt:
              type: string
              description: String to add to the CRC calculation
            ignoreOlderThan:
              type: string
              description: >-
                Time modifier to skip files that have not been modified
                within the specified time
          example: example_value
    MonitorInputList:
      type: object
      properties:
        origin:
          type: string
          example: example_value
        updated:
          type: string
          format: date-time
          example: '2026-01-15T10:30:00Z'
        entry:
          type: array
          items:
            $ref: "#/components/schemas/MonitorInput"
          example: []
        paging:
          $ref: "#/components/schemas/Paging"
    MonitorInputCreateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: The file or directory path to monitor
